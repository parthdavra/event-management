name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t event-management-backend:ci ./backend

      - name: Run unit tests
        run: docker run --rm event-management-backend:ci python -m pytest tests/ -v

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t event-management-frontend:ci ./frontend

  compose-validate:
    name: docker-compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          touch .env
          docker compose config -q

  infra-lint:
    name: Lint CloudFormation templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint infra templates
        # W1011 (use a Secrets Manager dynamic reference instead of a NoEcho
        # parameter for DB passwords) is a deliberate, already-verified-safe
        # tradeoff here — the password is passed at deploy time, never
        # committed, matching the existing OpenSearch template's pattern.
        run: cfn-lint --ignore-checks W1011 -- infra/*.yml

  deploy:
    name: Deploy to ECS
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-tests, frontend-build, compose-validate, infra-lint]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC — no stored AWS access keys
      contents: read
    env:
      AWS_REGION: eu-west-2
      ECR_REGISTRY: 666127452756.dkr.ecr.eu-west-2.amazonaws.com
      ECS_CLUSTER: dstrmaysam-evmgmt-dev
      ECS_SERVICE: dstrmaysam-evmgmt-app-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.EVMGMT_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-backend:${{ github.sha }} \
                        -t ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-backend:latest ./backend
          docker push ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-backend:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-frontend:${{ github.sha }} \
                        -t ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-frontend:latest ./frontend
          docker push ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-frontend:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/dstrmaysam-evmgmt-frontend:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Wait for service to reach steady state
        run: |
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
