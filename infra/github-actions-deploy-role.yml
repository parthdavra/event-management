AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM role assumed by GitHub Actions (via OIDC, no stored AWS access keys) to
  build/push images to ECR and force a new ECS deployment on push to main.
  Reuses the account's existing token.actions.githubusercontent.com OIDC
  provider rather than creating a duplicate.

Parameters:
  OidcProviderArn:
    Type: String
    Default: arn:aws:iam::666127452756:oidc-provider/token.actions.githubusercontent.com
  GitHubRepo:
    Type: String
    Default: parthdavra/event-management
    Description: "org/repo — the role can only be assumed by workflows in this repo."
  GitHubBranch:
    Type: String
    Default: main
    Description: Only workflows running on this branch may assume the role.
  ProjectTag:
    Type: String
    Default: event-management
  ApplicationTag:
    Type: String
    Default: dstrmaysam
  OwnerTag:
    Type: String
    Default: parthdavra

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dstrmaysam-evmgmt-github-actions-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: PushImagesAndDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/dstrmaysam-evmgmt-backend"
                  - !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/dstrmaysam-evmgmt-frontend"
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource:
                  - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/dstrmaysam-evmgmt-dev/dstrmaysam-evmgmt-app-service"
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsDeployRole.Arn
