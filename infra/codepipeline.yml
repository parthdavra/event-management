AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CodePipeline + CodeBuild deployment for event-management, replacing the
  GitHub Actions deploy job for consistency with sibling projects on this
  account. Source is GitHub via a CodeStar Connection (requires a one-time
  manual authorization in the console — this template cannot complete that
  handshake). Build: buildspec.yml builds/pushes both images and writes
  imagedefinitions.json. Deploy: native CodePipeline ECS deploy action updates
  the existing service — no static AWS credentials involved anywhere.

Parameters:
  GitHubOwner:
    Type: String
    Default: parthdavra
  GitHubRepo:
    Type: String
    Default: event-management
  GitHubBranch:
    Type: String
    Default: main
  EcsClusterName:
    Type: String
    Default: dstrmaysam-evmgmt-dev
  EcsServiceName:
    Type: String
    Default: dstrmaysam-evmgmt-app-service
  TaskExecutionRoleArn:
    Type: String
    Default: arn:aws:iam::666127452756:role/dstrmaysam-evmgmt-ecs-TaskExecutionRole-hvrv9S1VI1VU
  TaskRoleArn:
    Type: String
    Default: arn:aws:iam::666127452756:role/dstrmaysam-evmgmt-ecs-TaskRole-C8l8oTEgxk93
  ProjectTag:
    Type: String
    Default: event-management
  ApplicationTag:
    Type: String
    Default: dstrmaysam
  OwnerTag:
    Type: String
    Default: parthdavra

Resources:
  # ── Source connection ──────────────────────────────────────────────────────────

  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: dstrmaysam-evmgmt-github
      ProviderType: GitHub

  # ── Artifact storage ────────────────────────────────────────────────────────────

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dstrmaysam-evmgmt-pipeline-artifacts-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

  # ── CodeBuild ───────────────────────────────────────────────────────────────────

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BuildAndPush
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/dstrmaysam-evmgmt-build*"
              - Effect: Allow
                Action: [s3:GetObject, s3:GetObjectVersion, s3:PutObject]
                Resource: !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/dstrmaysam-evmgmt-backend"
                  - !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/dstrmaysam-evmgmt-frontend"

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dstrmaysam-evmgmt-build
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts: { Type: CODEPIPELINE }
      Source: { Type: CODEPIPELINE, BuildSpec: buildspec.yml }
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true   # required to run `docker build` inside CodeBuild
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

  # ── CodePipeline ─────────────────────────────────────────────────────────────────

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codepipeline.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunPipeline
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:GetObjectVersion, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              - Effect: Allow
                Action: [codebuild:StartBuild, codebuild:BatchGetBuilds]
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: "*"
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Ref TaskExecutionRoleArn
                  - !Ref TaskRoleArn

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dstrmaysam-evmgmt-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
              OutputArtifacts: [{ Name: SourceOutput }]

        - Name: Build
          Actions:
            - Name: BuildAndPushImages
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts: [{ Name: SourceOutput }]
              OutputArtifacts: [{ Name: BuildOutput }]

        - Name: Deploy
          Actions:
            - Name: DeployToEcs
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              Configuration:
                ClusterName: !Ref EcsClusterName
                ServiceName: !Ref EcsServiceName
                FileName: imagedefinitions.json
              InputArtifacts: [{ Name: BuildOutput }]
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  ConnectionArn:
    Description: Authorize this connection in the console before the pipeline can run (Developer Tools > Settings > Connections > Update pending connection).
    Value: !Ref GitHubConnection
  PipelineName:
    Value: !Ref Pipeline
