AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Consolidated AWS Secrets Manager secret holding event-management's application
  secrets (DB URL, JWT key, Azure OpenAI, OpenSearch, venue APIs, MCP, Langfuse).
  AWS bootstrap credentials (AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN/REGION) are
  never stored here — they're what the app uses to reach this secret in the
  first place, so they stay as plain environment variables.
  This template only creates the secret shell; populate/update real values with
  `aws secretsmanager put-secret-value` — never commit real values to this file.

Parameters:
  SecretName:
    Type: String
    Default: dstrmaysam-evmgmt-secrets
  ProjectTag:
    Type: String
    Default: event-management
  ApplicationTag:
    Type: String
    Default: dstrmaysam
  OwnerTag:
    Type: String
    Default: parthdavra

Resources:
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Consolidated application secrets for event-management.
      SecretString: "{}"
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  SecretArn:
    Value: !Ref AppSecrets
  SecretName:
    Value: !Ref SecretName
